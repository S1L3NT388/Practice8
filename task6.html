<!DOCTYPE html>
<html>
<head>
  <style>
    button { padding: 10px; cursor: pointer; border-radius: 5px; border: 1px solid #ccc; }
    body { 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        justify-content: center; 
        height: 100vh; 
        transition: background-color 0.3s ease;
    }
    p { font-size: 24px; transition: color 0.3s ease; }
  </style>
</head>
<body>

<p id="text">Party igs</p>
<button id="colorBtn">Click</button>

<script>
  const getRandomColor = () => {
    const letters = '0123456789ABCDEF';
    let color = '#';
    for (let i = 0; i < 6; i++) {
      color += letters[Math.floor(Math.random() * 16)];
    }
    return color;
  };

  const btn = document.getElementById('colorBtn');
  const text = document.getElementById('text');
  const body = document.body;

  btn.addEventListener('click', () => {
    const randomBgColor = getRandomColor();
    const randomTextColor = getRandomColor();

    body.style.backgroundColor = randomBgColor;

    text.style.color = randomTextColor;

    console.log(`Фон: ${randomBgColor}, Текст: ${randomTextColor}`);
  });
</script>

</body>
</html>
